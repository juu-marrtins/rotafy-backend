services:
  application:
    build:
      dockerfile: Dockerfile
    container_name: laravel_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
    command: sh -c "php artisan config:clear && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - rotafy_network

  postgres: 
    image: postgres:18
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - rotafy_network

volumes:
  laravel_app:  
  postgres_data:

networks:
  rotafy_network:
    name: rotafy_network  
    driver: bridge